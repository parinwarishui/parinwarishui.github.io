{% extends "base.html" %} {% set title = post.title %} {% block content %}

<a
  href="/blog/"
  class="text-textMuted hover:text-accent text-sm transition-colors"
>
  ← All posts
</a>

<div class="mt-6 mb-8">
  <h1 class="text-2xl font-semibold text-heading mb-2">{{ post.title }}</h1>
  <div class="flex items-center gap-3 flex-wrap">
    <span class="text-textMuted text-sm">{{ post.date }}</span>
    {% for tag in post.tags %}
    <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
</div>

<article class="prose">{{ post.content | safe }}</article>

{% endblock %}
